services:
  postgres:
    image: postgres:16-alpine
    container_name: nigeria-legal-postgres
    environment:
      POSTGRES_DB: nigeria_legal_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nigeria_legal_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nigeria-legal-migrate
    working_dir: /app
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/nigeria_legal_mvp
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migration

volumes:
  postgres_data:
