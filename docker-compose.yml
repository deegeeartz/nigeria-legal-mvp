services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nigeria-legal-api
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/nigeria_legal_mvp}
      APP_UPLOADS_DIR: /app/storage/uploads
    volumes:
      - ./:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nigeria-legal-frontend
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  frontend_node_modules:
